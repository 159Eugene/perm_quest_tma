# Глобальная конфигурация Nginx для продакшена на вашем VPS
user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # --- ВКЛЮЧАЕМ СЖАТИЕ GZIP (Ускорение загрузки ТМА в 3 раза) ---
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    # --- ЗОНА АНТИ-DDOS ДЛЯ API ---
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=15r/s;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    sendfile on;
    keepalive_timeout 65;

    # --- УВЕЛИЧИВАЕМ ЛИМИТ РАЗМЕРА ЗАГРУЖАЕМЫХ ФАЙЛОВ ---
    # По умолчанию Nginx блокирует файлы больше 1 МБ (ошибка 413).
    # Ставим 50 МБ (хватит для любых фото и длинных аудиогидов).
    client_max_body_size 50m;

    # Конфигурация сервера для обработки трафика вашего домена
    server {
        listen 80;
        # Замените 'yourdomain.com' на ваш зарегистрированный домен
        server_name questsity.ru www.questsity.ru;

        # Проверка Let's Encrypt для автоматического получения SSL
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Принудительное перенаправление всего HTTP трафика на безопасный HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        # Замените 'yourdomain.com' на ваш зарегистрированный домен
        server_name questsity.ru www.questsity.ru;

        # Пути к SSL сертификатам, которые сгенерирует Certbot
        ssl_certificate /etc/letsencrypt/live/questsity.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/questsity.ru/privkey.pem;

        # Современные настройки безопасности SSL
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;

        # Роутинг запросов к игровому API (FastAPI бэкенд)
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay; # Отсекает спам больше 15 запросов в сек
            proxy_pass http://api:8000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Настройки тайм-аутов для долгих запросов геолокации
            proxy_connect_timeout 90;
            proxy_send_timeout 90;
            proxy_read_timeout 90;
        }

        # СТАЛО (Добавили 2 строчки auth_basic):
        # Веб-админпанель (SQLAdmin)
        location /admin {
            auth_basic "Restricted Admin Area";
            auth_basic_user_file /etc/nginx/.htpasswd;

            proxy_pass http://api:8000/admin;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Port 443;
            proxy_cookie_path / /;
        }

        # Также защищаем новую Map-админку
        location /admin-map/ {
            auth_basic "Restricted Admin Area";
            auth_basic_user_file /etc/nginx/.htpasswd;

            proxy_pass http://api:8000/admin-map/;
            proxy_set_header Host $host;
        }

        # Раздача статического фронтенда Mini App
        location / {
            root /usr/share/nginx/html;
            index index.html;

            # --- КЭШИРОВАНИЕ СТАТИКИ НА 30 ДНЕЙ ---
            expires 30d;
            add_header Cache-Control "public, no-transform";

            try_files $uri $uri/ /index.html;
        }
    }
# --- Настройки для BestRent (play-perm.ru) ---
server {
    listen 80;
    server_name play-perm.ru www.play-perm.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name play-perm.ru www.play-perm.ru;

    # Пути к сертификатам внутри контейнера
    ssl_certificate /etc/letsencrypt/live/play-perm.ru/certificate.crt;
    ssl_certificate_key /etc/letsencrypt/live/play-perm.ru/certificate.key;

    location / {
        # Запрос уходит на порт 5010 хост-машины
        proxy_pass http://172.18.0.1:5010;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

}
