# Глобальная конфигурация Nginx для продакшена на вашем VPS
user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    sendfile on;
    keepalive_timeout 65;

    # Конфигурация сервера для обработки трафика вашего домена
    server {
        listen 80;
        # Замените 'yourdomain.com' на ваш зарегистрированный домен
        server_name questsity.ru www.questsity.ru;

        # Проверка Let's Encrypt для автоматического получения SSL
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Принудительное перенаправление всего HTTP трафика на безопасный HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        # Замените 'yourdomain.com' на ваш зарегистрированный домен
        server_name questsity.ru www.questsity.ru;

        # Пути к SSL сертификатам, которые сгенерирует Certbot
        ssl_certificate /etc/letsencrypt/live/questsity.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/questsity.ru/privkey.pem;

        # Современные настройки безопасности SSL
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;

        # Роутинг запросов к игровому API (FastAPI бэкенд)
        location /api/ {
            proxy_pass http://api:8000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Настройки тайм-аутов для долгих запросов геолокации
            proxy_connect_timeout 90;
            proxy_send_timeout 90;
            proxy_read_timeout 90;
        }

        # Веб-админпанель (SQLAdmin)
        location /admin {
            proxy_pass http://api:8000/admin;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Port 443;
            proxy_cookie_path / /;
        }

        # Раздача статического фронтенда Mini App
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
    }
}