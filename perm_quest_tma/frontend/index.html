<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Perm Quest Platform — TMA</title>
    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel для компиляции JSX на лету в браузере -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --tg-theme-bg-color: #0f172a;
            --tg-theme-text-color: #f8fafc;
            --tg-theme-secondary-bg-color: #1e293b;
            --tg-theme-button-color: #6366f1;
            --tg-theme-button-text-color: #ffffff;
            --tg-theme-hint-color: #94a3b8;
        }
        body {
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
        }
        /* Стили для шторки сравнения фото Было/Стало */
        .slider-container {
            position: relative;
            overflow: hidden;
            user-select: none;
        }
        .slider-before {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .slider-handle {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 4px;
            background-color: #6366f1;
            cursor: ew-resize;
            z-index: 10;
        }
        .slider-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: #6366f1;
            border: 3px solid #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
    </style>
</head>
<body class="p-0 m-0">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const tg = window.Telegram?.WebApp;

        function App() {
            const [activeTab, setActiveTab] = useState("quest"); // quest, profile, inventory, shop, rating
            const [profile, setProfile] = useState(null);
            const [quests, setQuests] = useState([]);
            const [activeQuest, setActiveQuest] = useState(null);
            const [inventory, setInventory] = useState({ items: [], current_weight: 0 });
            const [shop, setShop] = useState([]);
            const [leaderboard, setLeaderboard] = useState([]);
            const [leaderboardPeriod, setLeaderboardPeriod] = useState("global");
            const [loading, setLoading] = useState(true);
            const [notification, setNotification] = useState(null);
            
            // Состояние ракурса фото-слайдера Было/Стало
            const [sliderValue, setSliderValue] = useState(50);
            const sliderRef = useRef(null);
            const isDragging = useRef(false);

            // Имитация геолокации для тестирования
            const [mockGps, setMockGps] = useState(true);
            const [coords, setCoords] = useState({ latitude: 58.0097, longitude: 56.2444 });
            const [currentDistance, setCurrentDistance] = useState(null);

            // Секретный токен авторизации (в продакшене берется из tg.initData)
            const getHeaders = () => {
                const initData = tg?.initData || "user=%7B%22id%22%3A5748413499%2C%22first_name%22%3A%22%D0%94%D0%BC%D0%B8%D1%82%D1%80%D0%B8%D0%B9%22%2C%22username%22%3A%22dm_perm%22%7D&hash=mockhash";
                return {
                    "Content-Type": "application/json",
                    "X-Tg-Init-Data": initData
                };
            };

            const triggerNotification = (text, type = "success") => {
                setNotification({ text, type });
                setTimeout(() => setNotification(null), 4000);
            };

            // Синхронизация данных при старте и переключении табов
            useEffect(() => {
                if (tg) {
                    tg.ready();
                    tg.expand();
                }
                loadData();
            }, [activeTab]);

            // Обновление Lucide иконок после каждого рендера
            useEffect(() => {
                lucide.createIcons();
            });

            const loadData = async () => {
                setLoading(true);
                try {
                    const headers = getHeaders();
                    
                    // Загружаем профиль
                    const profRes = await fetch("/api/profile", { headers });
                    const profData = await profRes.json();
                    setProfile(profData);

                    // Загружаем состояние квеста
                    const activeRes = await fetch("/api/quest/active", { headers });
                    const activeData = await activeRes.json();
                    setActiveQuest(activeData.active ? activeData : null);

                    if (activeTab === "quest" && !activeData.active) {
                        const questListRes = await fetch("/api/quests", { headers });
                        const questListData = await questListRes.json();
                        setQuests(questListData);
                    }

                    if (activeTab === "inventory") {
                        const invRes = await fetch("/api/inventory", { headers });
                        const invData = await invRes.json();
                        setInventory(invData);
                    }

                    if (activeTab === "shop") {
                        const shopRes = await fetch("/api/shop", { headers });
                        const shopData = await shopRes.json();
                        setShop(shopData);
                    }

                    if (activeTab === "rating") {
                        const rateRes = await fetch(`/api/leaderboard?period=${leaderboardPeriod}`, { headers });
                        const rateData = await rateRes.json();
                        setLeaderboard(rateData);
                    }

                } catch (error) {
                    console.error("Ошибка загрузки данных API:", error);
                    triggerNotification("Ошибка подключения к серверу VPS!", "error");
                }
                setLoading(false);
            };

            // Изменение периода рейтинга
            useEffect(() => {
                if (activeTab === "rating") {
                    loadData();
                }
            }, [leaderboardPeriod]);

            // Логика слайдера сравнения
            const handleTouchMove = (e) => {
                if (!sliderRef.current) return;
                const rect = sliderRef.current.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const offset = clientX - rect.left;
                let percentage = (offset / rect.width) * 100;
                if (percentage < 0) percentage = 0;
                if (percentage > 100) percentage = 100;
                setSliderValue(percentage);
            };

            const handleMouseDown = () => { isDragging.current = true; };
            const handleMouseUp = () => { isDragging.current = false; };
            const handleMouseMove = (e) => {
                if (isDragging.current) {
                    handleTouchMove(e);
                }
            };

            // Реальная геолокация HTML5 Geolocation API
            useEffect(() => {
                if (mockGps) return;
                
                const watchId = navigator.geolocation.watchPosition(
                    (position) => {
                        const userCoords = {
                            latitude: position.coords.latitude,
                            longitude: position.coords.longitude
                        };
                        setCoords(userCoords);
                        if (activeQuest?.step) {
                            const dist = calculateHaversine(
                                userCoords.latitude, 
                                userCoords.longitude, 
                                activeQuest.step.latitude, 
                                activeQuest.step.longitude
                            );
                            setCurrentDistance(parseInt(dist));
                        }
                    },
                    (error) => {
                        console.error("Ошибка GPS:", error);
                        triggerNotification("Не удалось получить реальный GPS сигнал!", "error");
                    },
                    { enableHighAccuracy: true, maximumAge: 1000 }
                );

                return () => navigator.geolocation.clearWatch(watchId);
            }, [mockGps, activeQuest]);

            // Симуляция Гаверсинуса на фронтенде для радара
            const calculateHaversine = (lat1, lon1, lat2, lon2) => {
                const R = 6371000;
                const dLat = (lat2 - lat1) * Math.PI / 180;
                const dLon = (lon2 - lon1) * Math.PI / 180;
                const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                          Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                          Math.sin(dLon/2) * Math.sin(dLon/2);
                const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                return R * c;
            };

            // Запуск квеста
            const startQuest = async (id) => {
                setLoading(true);
                try {
                    const res = await fetch(`/api/quest/start/${id}`, {
                        method: "POST",
                        headers: getHeaders()
                    });
                    if (res.ok) {
                        triggerNotification("Квест успешно запущен!");
                        await loadData();
                    } else {
                        const err = await res.json();
                        triggerNotification(err.detail, "error");
                    }
                } catch (e) {
                    triggerNotification("Ошибка сети.", "error");
                }
                setLoading(false);
            };

            // Сбор пассивного дохода
            const claimIncome = async () => {
                try {
                    const res = await fetch("/api/profile/claim-income", {
                        method: "POST",
                        headers: getHeaders()
                    });
                    const d = await res.json();
                    if (d.status === "success") {
                        triggerNotification(`Прибыль собрана: +${d.collected_coins} 🪙`);
                        loadData();
                    }
                } catch (e) {
                    triggerNotification("Ошибка транзакции.", "error");
                }
            };

            // Подтверждение геопозиции
            const verifyPosition = async () => {
                try {
                    const res = await fetch("/api/quest/verify-location", {
                        method: "POST",
                        headers: getHeaders(),
                        body: JSON.stringify(coords)
                    });
                    const d = await res.json();
                    if (d.status === "success") {
                        triggerNotification("Вы успешно прибыли на точку квеста!", "success");
                        loadData();
                    } else if (d.status === "too_far") {
                        triggerNotification(d.message, "error");
                    } else if (d.status === "banned") {
                        triggerNotification(d.message, "error");
                        loadData();
                    } else if (d.status === "speed_warning") {
                        triggerNotification(d.message, "error");
                    }
                } catch (e) {
                    triggerNotification("Ошибка связи.", "error");
                }
            };

            // Отправка ответа на загадку
            const [userAns, setUserAns] = useState("");
            const submitAnswer = async () => {
                if (!userAns) return;
                try {
                    const res = await fetch("/api/quest/submit-answer", {
                        method: "POST",
                        headers: getHeaders(),
                        body: JSON.stringify({ answer: userAns })
                    });
                    const d = await res.json();
                    if (d.status === "next_step") {
                        triggerNotification("Верно! Переходим на следующую локацию.", "success");
                        setUserAns("");
                        loadData();
                    } else if (d.status === "finished") {
                        triggerNotification(`Поздравляем! Квест завершен! Вы набрали ${d.score} очков.`, "success");
                        setUserAns("");
                        loadData();
                    } else if (d.status === "wrong") {
                        triggerNotification(d.message, "error");
                    }
                } catch (e) {
                    triggerNotification("Ошибка обработки ответа.", "error");
                }
            };

            // Выбор в NPC диалогах
            const selectNpcChoice = async (idx) => {
                try {
                    const res = await fetch(`/api/quest/npc-choice/${idx}`, {
                        method: "POST",
                        headers: getHeaders()
                    });
                    const d = await res.json();
                    triggerNotification(d.message || "Диалог обновлен");
                    loadData();
                } catch (e) {
                    triggerNotification("Ошибка взаимодействия.", "error");
                }
            };

            // Покупка предмета в лавке
            const buyItem = async (itemId) => {
                try {
                    const res = await fetch(`/api/shop/buy/${itemId}`, {
                        method: "POST",
                        headers: getHeaders()
                    });
                    if (res.ok) {
                        const d = await res.json();
                        triggerNotification(`Приобретено: ${d.item_name}!`, "success");
                        loadData();
                    } else {
                        const d = await res.json();
                        triggerNotification(d.detail, "error");
                    }
                } catch (e) {
                    triggerNotification("Ошибка сети.", "error");
                }
            };

            // Активация расходника
            const useConsumable = async (name) => {
                try {
                    const res = await fetch(`/api/inventory/use/${name}`, {
                        method: "POST",
                        headers: getHeaders()
                    });
                    const d = await res.json();
                    triggerNotification(d.message, "success");
                    loadData();
                } catch (e) {
                    triggerNotification("Ошибка активации.", "error");
                }
            };

            // Утилизация предмета
            const discardItem = async (name) => {
                try {
                    const res = await fetch(`/api/inventory/discard/${name}`, {
                        method: "POST",
                        headers: getHeaders()
                    });
                    if (res.ok) {
                        triggerNotification("Предмет утилизирован.", "success");
                        loadData();
                    }
                } catch (e) {
                    triggerNotification("Ошибка.", "error");
                }
            };

            return (
                <div class="max-w-md mx-auto pb-24 relative min-h-screen flex flex-col justify-between">
                    
                    {/* КРАСИВОЕ СИСТЕМНОЕ УВЕДОМЛЕНИЕ ВМЕСТО ALERT() */}
                    {notification && (
                        <div class={`fixed top-4 left-4 right-4 z-50 p-4 rounded-xl shadow-lg border text-white font-medium flex items-center justify-between transition-all duration-300 ${
                            notification.type === "success" ? "bg-emerald-600 border-emerald-500" : "bg-rose-600 border-rose-500"
                        }`}>
                            <span>{notification.text}</span>
                            <button onClick={() => setNotification(null)} class="text-white hover:text-gray-200">
                                <i data-lucide="x" class="w-5 h-5"></i>
                            </button>
                        </div>
                    )}

                    {/* ШАПКА ПЛАТФОРМЫ */}
                    <header class="p-4 bg-slate-900/80 backdrop-blur-md border-b border-slate-800 sticky top-0 z-40 flex items-center justify-between">
                        <div class="flex items-center gap-2">
                            <span class="text-2xl">🗺</span>
                            <div>
                                <h1 class="text-md font-bold tracking-tight text-white leading-none">Perm Quest</h1>
                                <span class="text-[11px] text-slate-400 font-medium">Telegram Mini App v2.0</span>
                            </div>
                        </div>
                        {profile && (
                            <div class="flex items-center gap-3">
                                <div class="bg-indigo-950 border border-indigo-800 px-3 py-1.5 rounded-lg flex items-center gap-1.5">
                                    <span class="text-amber-400 text-sm">🪙</span>
                                    <span class="text-amber-300 font-extrabold text-sm">{profile.coins}</span>
                                </div>
                            </div>
                        )}
                    </header>

                    {/* ТЕЛО СТРАНИЦЫ */}
                    <main class="p-4 flex-grow">
                        {loading && (
                            <div class="flex flex-col items-center justify-center py-24 gap-4">
                                <div class="w-12 h-12 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
                                <span class="text-slate-400 font-medium">Загрузка данных Перми...</span>
                            </div>
                        )}

                        {!loading && activeTab === "quest" && (
                            <div>
                                {/* КВЕСТ НЕ ЗАПУЩЕН */}
                                {!activeQuest && (
                                    <div class="space-y-4">
                                        <div class="bg-slate-900 border border-slate-800 p-5 rounded-2xl">
                                            <h3 class="text-lg font-bold text-white mb-2">🚶‍♂️ Доступные пешие треки по Перми</h3>
                                            <p class="text-sm text-slate-400 mb-4">Выберите один из готовых маршрутов, чтобы начать увлекательное расследование прямо на улицах города.</p>
                                        </div>
                                        <div class="grid gap-3">
                                            {quests.map((q) => (
                                                <div key={q.id} class="bg-slate-900/50 border border-slate-800 p-4 rounded-xl flex flex-col justify-between gap-3">
                                                    <div>
                                                        <div class="flex justify-between items-start mb-1">
                                                            <h4 class="font-bold text-md text-indigo-400">{q.title}</h4>
                                                            <span class="text-[10px] uppercase font-bold tracking-wider px-2 py-0.5 rounded bg-indigo-950 border border-indigo-800 text-indigo-300">
                                                                Lvl {q.min_level_required}+
                                                            </span>
                                                        </div>
                                                        <p class="text-xs text-slate-400 line-clamp-2">{q.description}</p>
                                                    </div>
                                                    <button 
                                                        disabled={q.is_locked}
                                                        onClick={() => startQuest(q.id)}
                                                        class={`w-full py-2.5 rounded-xl font-bold text-sm tracking-wide ${
                                                            q.is_locked 
                                                            ? "bg-slate-800 text-slate-500 cursor-not-allowed" 
                                                            : "bg-indigo-600 hover:bg-indigo-500 text-white shadow-lg shadow-indigo-950/40"
                                                        }`}
                                                    >
                                                        {q.is_locked ? "🔒 Недостаточный уровень" : "🏃‍♂️ Начать приключение"}
                                                    </button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {/* ИДЕТ КВЕСТ — АКТИВНЫЙ ЭКРАН ИГРЫ */}
                                {activeQuest && (
                                    <div class="space-y-4">
                                        
                                        {/* ПАНЕЛЬ РЕЖИМА СИМУЛЯЦИИ И GPS НАСТРОЙКИ ДЛЯ ТЕСТА */}
                                        <div class="bg-indigo-950/40 border border-indigo-800/60 p-4 rounded-2xl space-y-3">
                                            <div class="flex items-center justify-between">
                                                <span class="text-xs font-bold text-indigo-300 uppercase tracking-wider">Панель симулятора GPS (для тестов)</span>
                                                <button 
                                                    onClick={() => setMockGps(!mockGps)}
                                                    class="text-xs font-extrabold text-white bg-indigo-800 px-3 py-1 rounded"
                                                >
                                                    {mockGps ? "🔌 Включить реал GPS" : "⚙️ Использовать симулятор"}
                                                </button>
                                            </div>
                                            {mockGps && (
                                                <div class="grid grid-cols-2 gap-2">
                                                    <button 
                                                        onClick={() => {
                                                            setCoords({ latitude: activeQuest.step.latitude, longitude: activeQuest.step.longitude });
                                                            setCurrentDistance(0);
                                                            triggerNotification("Телепортировано на целевую точку!");
                                                        }} 
                                                        class="bg-slate-800 text-white py-1.5 rounded text-xs font-semibold hover:bg-slate-700"
                                                    >
                                                        📍 Прыгнуть к цели
                                                    </button>
                                                    <button 
                                                        onClick={() => {
                                                            setCoords({ latitude: activeQuest.step.latitude + 0.002, longitude: activeQuest.step.longitude - 0.003 });
                                                            const d = calculateHaversine(coords.latitude, coords.longitude, activeQuest.step.latitude, activeQuest.step.longitude);
                                                            setCurrentDistance(parseInt(d));
                                                            triggerNotification("Перемещено в сторону от цели.");
                                                        }}
                                                        class="bg-slate-800 text-white py-1.5 rounded text-xs font-semibold hover:bg-slate-700"
                                                    >
                                                        🚶‍♂️ Отойти на 300м
                                                    </button>
                                                </div>
                                            )}
                                        </div>

                                        {/* РАДАР (ВМЕСТО СТАРЫХ КНОПОК ОПРОСА В ЧАТЕ) */}
                                        <div class="bg-slate-900 border border-slate-800 p-5 rounded-2xl flex flex-col items-center justify-center text-center space-y-4">
                                            <div class="relative w-28 h-28 border-4 border-indigo-600/40 rounded-full flex items-center justify-center animate-pulse">
                                                <div class="absolute inset-2 border-2 border-indigo-500 rounded-full"></div>
                                                <span class="text-4xl">🛰</span>
                                            </div>
                                            <div>
                                                <h3 class="text-md font-bold text-white">📡 Живой радар пешехода</h3>
                                                <p class="text-xs text-slate-400 mt-1">До Контрольной точки:</p>
                                                <span class="text-2xl font-black text-indigo-400 mt-2 block">
                                                    {currentDistance !== null ? `${currentDistance} метров` : "Ожидание сигнала GPS..."}
                                                </span>
                                            </div>
                                            <button 
                                                onClick={verifyPosition}
                                                class="bg-indigo-600 hover:bg-indigo-500 text-white font-bold text-sm tracking-wide px-6 py-2.5 rounded-xl shadow-lg shadow-indigo-950/40"
                                            >
                                                📍 Я на месте (Подтвердить)
                                            </button>
                                        </div>

                                        {/* ЗАГАДКА И ВВОД ОТВЕТА */}
                                        <div class="bg-slate-900 border border-slate-800 p-5 rounded-2xl space-y-4">
                                            <div class="space-y-1">
                                                <span class="text-[10px] uppercase font-bold tracking-widest text-indigo-400">Сюжетная загадка</span>
                                                <h4 class="text-md font-bold text-white leading-relaxed">{activeQuest.step.instruction_text}</h4>
                                            </div>

                                            {/* ШТОРКА СРАВНЕНИЯ ИЗОБРАЖЕНИЙ «БЫЛО / СТАЛО» */}
                                            {activeQuest.step.photo_then_id && (
                                                <div class="space-y-1">
                                                    <span class="text-[10px] uppercase font-bold tracking-widest text-indigo-400">Ракурс времени (Слайдер)</span>
                                                    <div 
                                                        ref={sliderRef}
                                                        onMouseMove={handleMouseMove}
                                                        onTouchMove={handleTouchMove}
                                                        onMouseDown={handleMouseDown}
                                                        onMouseUp={handleMouseUp}
                                                        onMouseLeave={handleMouseUp}
                                                        class="slider-container w-full h-48 rounded-xl border border-slate-800"
                                                    >
                                                        {/* Картинка Стало (Современный ракурс) */}
                                                        <img 
                                                            src="https://images.unsplash.com/photo-1590073844006-33379778ae09?auto=format&fit=crop&w=600&q=80" 
                                                            class="w-full h-full object-cover"
                                                            alt="Сейчас"
                                                        />
                                                        {/* Картинка Было (Исторический ракурс) */}
                                                        <div 
                                                            class="slider-before"
                                                            style={{ clipPath: `polygon(0 0, ${sliderValue}% 0, ${sliderValue}% 100%, 0 100%)` }}
                                                        >
                                                            <img 
                                                                src="https://images.unsplash.com/photo-1513407030348-c983a97b98d8?auto=format&fit=crop&w=600&q=80" 
                                                                class="w-full h-full object-cover"
                                                                alt="Тогда"
                                                            />
                                                        </div>
                                                        {/* Ползунок */}
                                                        <div class="slider-handle" style={{ left: `${sliderValue}%` }}>
                                                            <div class="slider-circle">
                                                                <span class="text-[10px] font-bold text-white">↔</span>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            )}

                                            {/* ФОРМА ОТВЕТА (ПРИНИМАЕТСЯ ТОЛЬКО ПОСЛЕ ПОДТВЕРЖДЕНИЯ КООРДИНАТ) */}
                                            <div class="pt-2">
                                                <input 
                                                    type="text" 
                                                    value={userAns}
                                                    onChange={(e) => setUserAns(e.target.value)}
                                                    placeholder="Введите ответ на загадку..."
                                                    class="w-full bg-slate-950 border border-slate-800 px-4 py-3 rounded-xl text-sm font-semibold text-white placeholder-slate-500 focus:outline-none focus:border-indigo-600 mb-3"
                                                />
                                                <button 
                                                    onClick={submitAnswer}
                                                    class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-extrabold text-sm tracking-wide py-3 rounded-xl shadow-lg shadow-emerald-950/40"
                                                >
                                                    🚀 Отправить ответ
                                                </button>
                                            </div>
                                        </div>

                                        {/* СЦЕНАРИЙ ДИАЛОГА С NPC (RPG СЕТКА) */}
                                        {activeQuest.step.npc_name && activeQuest.step.npc_dialogue && activeQuest.current_npc_node && (
                                            <div class="bg-slate-950 border border-indigo-900/80 p-5 rounded-2xl space-y-4">
                                                <div class="flex items-center gap-3">
                                                    <div class="w-10 h-10 rounded-full bg-indigo-950 border border-indigo-800 flex items-center justify-center text-lg">
                                                        🗣
                                                    </div>
                                                    <div>
                                                        <h4 class="font-extrabold text-sm text-indigo-400 uppercase tracking-widest">{activeQuest.step.npc_name}</h4>
                                                        <span class="text-[10px] text-slate-500 font-bold">Интерактивный персонаж</span>
                                                    </div>
                                                </div>
                                                <p class="text-sm font-semibold text-white leading-relaxed italic">
                                                    «{activeQuest.step.npc_dialogue[activeQuest.current_npc_node]?.text}»
                                                </p>
                                                <div class="grid gap-2">
                                                    {activeQuest.step.npc_dialogue[activeQuest.current_npc_node]?.options.map((opt, idx) => (
                                                        <button 
                                                            key={idx}
                                                            onClick={() => selectNpcChoice(idx)}
                                                            class="text-left w-full bg-slate-900 border border-slate-800 p-3 rounded-xl text-xs font-bold text-slate-300 hover:bg-slate-800 hover:text-white flex justify-between items-center"
                                                        >
                                                            <span>{opt.text}</span>
                                                            <span class="text-[10px] text-slate-500">выбрать →</span>
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                        )}

                                    </div>
                                )}
                            </div>
                        )}

                        {/* ВКЛАДКА ПРОФИЛЯ */}
                        {!loading && activeTab === "profile" && profile && (
                            <div class="space-y-4">
                                <div class="bg-slate-900 border border-slate-800 p-5 rounded-2xl flex flex-col items-center text-center space-y-3">
                                    <div class="w-16 h-16 bg-indigo-950 border border-indigo-800 rounded-full flex items-center justify-center text-3xl shadow-inner">
                                        👤
                                    </div>
                                    <div>
                                        <h3 class="text-lg font-black text-white">{profile.full_name}</h3>
                                        <span class="text-xs font-bold tracking-widest text-indigo-400 uppercase">{profile.rpg_class}</span>
                                    </div>
                                </div>

                                <div class="bg-slate-900 border border-slate-800 p-5 rounded-2xl space-y-4">
                                    <div class="flex justify-between items-center">
                                        <span class="text-xs font-bold text-slate-400 uppercase">Уровень персонажа</span>
                                        <span class="text-sm font-black text-white">{profile.level} Lvl</span>
                                    </div>
                                    <div class="space-y-1">
                                        <div class="flex justify-between text-[11px] font-extrabold text-slate-500 uppercase">
                                            <span>Опыт (XP)</span>
                                            <span>{profile.xp} / {profile.xp_needed} XP</span>
                                        </div>
                                        <div class="w-full bg-slate-950 h-2.5 rounded-full overflow-hidden border border-slate-900">
                                            <div 
                                                class="bg-indigo-500 h-full rounded-full" 
                                                style={{ width: `${Math.min(100, (profile.xp / profile.xp_needed) * 100)}%` }}
                                            ></div>
                                        </div>
                                    </div>
                                </div>

                                <div class="bg-slate-900 border border-slate-800 p-5 rounded-2xl space-y-3">
                                    <h4 class="text-xs font-extrabold text-slate-400 uppercase tracking-widest mb-1">Экономические активы</h4>
                                    <div class="flex justify-between items-center bg-slate-950 p-3 rounded-xl border border-slate-900">
                                        <div>
                                            <span class="text-xs font-bold text-slate-400">Баланс монет</span>
                                            <span class="block text-lg font-black text-amber-300">{profile.coins} 🪙</span>
                                        </div>
                                        <span class="text-xl">💰</span>
                                    </div>
                                    <div class="flex justify-between items-center bg-slate-950 p-3 rounded-xl border border-slate-900">
                                        <div>
                                            <span class="text-xs font-bold text-slate-400">Накопленный пассив</span>
                                            <span class="block text-lg font-black text-emerald-400">+{profile.income_buffer} 🪙</span>
                                        </div>
                                        {profile.income_buffer > 0 ? (
                                            <button 
                                                onClick={claimIncome}
                                                class="bg-emerald-600 hover:bg-emerald-500 text-white text-xs font-extrabold px-3 py-2 rounded-lg"
                                            >
                                                Собрать
                                            </button>
                                        ) : (
                                            <span class="text-xl">🏦</span>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* ВКЛАДКА ИНВЕНТАРЯ (РЮКЗАК) */}
                        {!loading && activeTab === "inventory" && (
                            <div class="space-y-4">
                                <div class="bg-slate-900 border border-slate-800 p-5 rounded-2xl">
                                    <div class="flex justify-between text-xs font-bold uppercase text-slate-400 mb-2">
                                        <span>Грузоподъемность рюкзака</span>
                                        <span>{inventory.current_weight} / {profile?.max_weight_capacity || 10} кг</span>
                                    </div>
                                    <div class="w-full bg-slate-950 h-3 rounded-full overflow-hidden border border-slate-900 mb-1">
                                        <div 
                                            class={`h-full rounded-full ${
                                                inventory.current_weight > (profile?.max_weight_capacity || 10) 
                                                ? "bg-rose-600" 
                                                : "bg-indigo-500"
                                            }`}
                                            style={{ width: `${Math.min(100, (inventory.current_weight / (profile?.max_weight_capacity || 10)) * 100)}%` }}
                                        ></div>
                                    </div>
                                    {inventory.current_weight > (profile?.max_weight_capacity || 10) && (
                                        <span class="text-[10px] text-rose-500 font-extrabold uppercase mt-1 block">🚨 Рюкзак перегружен! Продвижение по квестам заблокировано.</span>
                                    )}
                                </div>

                                <div class="space-y-2">
                                    {inventory.items.length === 0 ? (
                                        <div class="bg-slate-900 border border-slate-800 p-8 rounded-2xl text-center">
                                            <span class="text-4xl">🎒</span>
                                            <h4 class="font-bold text-white mt-2">Рюкзак пуст</h4>
                                            <p class="text-xs text-slate-500 mt-1">Исследуйте город, находите реликвии или приобретайте их в лавках скупщиков.</p>
                                        </div>
                                    ) : (
                                        inventory.items.map((item, idx) => (
                                            <div key={idx} class="bg-slate-900/50 border border-slate-800 p-4 rounded-xl flex items-center justify-between gap-3">
                                                <div class="flex items-center gap-3">
                                                    <span class="text-2xl">📦</span>
                                                    <div>
                                                        <h4 class="font-bold text-white text-sm">{item}</h4>
                                                        <span class="text-[10px] text-slate-500 uppercase font-bold">Сюжетный артефакт</span>
                                                    </div>
                                                </div>
                                                <div class="flex gap-2">
                                                    {item.includes("Эликсир") && (
                                                        <button 
                                                            onClick={() => useConsumable(item)}
                                                            class="bg-indigo-600 hover:bg-indigo-500 text-white text-[11px] font-bold px-3 py-1.5 rounded-lg"
                                                        >
                                                            Выпить
                                                        </button>
                                                    )}
                                                    <button 
                                                        onClick={() => discardItem(item)}
                                                        class="bg-slate-800 hover:bg-slate-700 text-slate-400 hover:text-rose-400 text-[11px] font-bold px-3 py-1.5 rounded-lg"
                                                    >
                                                        Сбросить
                                                    </button>
                                                </div>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        )}

                        {/* ВКЛАДКА МАГАЗИНА */}
                        {!loading && activeTab === "shop" && (
                            <div class="space-y-4">
                                <div class="bg-slate-900 border border-slate-800 p-5 rounded-2xl">
                                    <h3 class="text-lg font-bold text-white mb-2">🏪 Глобальный купеческий магазин</h3>
                                    <p class="text-xs text-slate-400">Обменивайте свои заработанные в квестах монеты на сюжетные реликвии, премиум-билеты или расходные материалы.</p>
                                </div>

                                <div class="grid gap-3">
                                    {shop.map((item) => (
                                        <div key={item.id} class="bg-slate-900/50 border border-slate-800 p-4 rounded-xl flex flex-col justify-between gap-3">
                                            <div>
                                                <div class="flex justify-between items-start mb-1">
                                                    <h4 class="font-bold text-md text-white">{item.name}</h4>
                                                    <span class="text-sm font-extrabold text-amber-400">{item.price} 🪙</span>
                                                </div>
                                                <p class="text-xs text-slate-400 leading-normal">{item.description}</p>
                                                <div class="flex gap-3 mt-2 text-[10px] text-slate-500 font-bold uppercase tracking-wider">
                                                    <span>⚖️ Вес: {item.weight} кг</span>
                                                    {item.generates_income && (
                                                        <span class="text-emerald-500">💰 Пассив: +{item.income_per_hour} 🪙/ч</span>
                                                    )}
                                                </div>
                                            </div>
                                            <button 
                                                onClick={() => buyItem(item.id)}
                                                class="w-full bg-indigo-600 hover:bg-indigo-500 text-white py-2 rounded-xl text-xs font-bold"
                                            >
                                                Купить за {item.price} 🪙
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* ВКЛАДКА РЕЙТИНГА */}
                        {!loading && activeTab === "rating" && (
                            <div class="space-y-4">
                                <div class="flex gap-1 bg-slate-950 p-1 rounded-xl border border-slate-900">
                                    {["global", "month", "year"].map((p) => (
                                        <button 
                                            key={p}
                                            onClick={() => setLeaderboardPeriod(p)}
                                            class={`flex-1 py-1.5 text-xs font-bold rounded-lg uppercase tracking-wider transition-all duration-200 ${
                                                leaderboardPeriod === p 
                                                ? "bg-indigo-600 text-white" 
                                                : "text-slate-400 hover:text-white"
                                            }`}
                                        >
                                            {p === "global" ? "Глобальный" : p === "month" ? "Месяц" : "Год"}
                                        </button>
                                    ))}
                                </div>

                                <div class="bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden divide-y divide-slate-800">
                                    {leaderboard.length === 0 ? (
                                        <div class="p-8 text-center text-xs text-slate-500">В этой категории пока нет рекордов.</div>
                                    ) : (
                                        leaderboard.map((user, idx) => (
                                            <div key={idx} class="p-4 flex items-center justify-between gap-3">
                                                <div class="flex items-center gap-3">
                                                    <span class={`w-6 h-6 flex items-center justify-center rounded-full text-xs font-black ${
                                                        idx === 0 ? "bg-amber-400 text-slate-950" :
                                                        idx === 1 ? "bg-slate-300 text-slate-950" :
                                                        idx === 2 ? "bg-amber-700 text-white" :
                                                        "bg-slate-800 text-slate-400"
                                                    }`}>
                                                        {idx + 1}
                                                    </span>
                                                    <div>
                                                        <h4 class="font-bold text-white text-sm">{user.full_name}</h4>
                                                        <span class="text-[10px] text-slate-400 font-bold uppercase">{user.title} | Lvl {user.level}</span>
                                                    </div>
                                                </div>
                                                <span class="text-sm font-black text-indigo-400">{user.total_score} очков</span>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        )}

                    </main>

                    {/* ТАББАР (МЕНЮ НАВИГАЦИИ СНИЗУ) */}
                    <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-slate-900/90 backdrop-blur-md border-t border-slate-800 py-2.5 px-6 flex justify-between z-40">
                        {[
                            { id: "quest", icon: "compass", label: "Квест" },
                            { id: "profile", icon: "user", label: "Профиль" },
                            { id: "inventory", icon: "package", label: "Рюкзак" },
                            { id: "shop", icon: "shopping-bag", label: "Магазин" },
                            { id: "rating", icon: "trophy", label: "Рейтинг" }
                        ].map((tab) => (
                            <button 
                                key={tab.id}
                                onClick={() => setActiveTab(tab.id)}
                                class={`flex flex-col items-center gap-1 bg-transparent border-none outline-none cursor-pointer transition-all duration-200 ${
                                    activeTab === tab.id ? "text-indigo-400 scale-105" : "text-slate-400 hover:text-slate-200"
                                }`}
                            >
                                <i data-lucide={tab.icon} class="w-5 h-5"></i>
                                <span class="text-[9px] font-extrabold uppercase tracking-widest">{tab.label}</span>
                            </button>
                        ))}
                    </nav>

                </div>
            );
        }

        // Рендеринг приложения и обновление иконок Lucide
        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);

        // Перерисовываем иконки при изменении DOM
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
