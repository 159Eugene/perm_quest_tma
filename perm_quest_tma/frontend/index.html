<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Perm Quest Platform — TMA</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    animation: {
                        slideUp: 'slideUp 0.3s ease-out forwards',
                    },
                    keyframes: {
                        slideUp: {
                            '0%': { transform: 'translateY(100%)', opacity: 0 },
                            '100%': { transform: 'translateY(0)', opacity: 1 },
                        }
                    }
                }
            }
        };
    </script>
    <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

    <style>
        :root {
            --tg-theme-bg-color: #0f172a;
            --tg-theme-text-color: #f8fafc;
            --tg-theme-secondary-bg-color: #1e293b;
            --tg-theme-button-color: #6366f1;
            --tg-theme-button-text-color: #ffffff;
            --tg-theme-hint-color: #94a3b8;
        }
        body {
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
        }
        
        .slider-container { position: relative; overflow: hidden; user-select: none; }
        .slider-before { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .slider-handle { position: absolute; top: 0; bottom: 0; width: 4px; background-color: #6366f1; cursor: ew-resize; z-index: 10; }
        .slider-circle { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 36px; height: 36px; border-radius: 50%; background-color: #6366f1; border: 3px solid #ffffff; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        
        .leaflet-container { background: #0f172a; outline: 0; font-family: inherit; }
        .custom-map-marker { display: flex; align-items: center; justify-content: center; background: transparent; border: none; }
        .user-marker { display: flex; align-items: center; justify-content: center; }
        .leaflet-control-attribution { display: none !important; }

        /* ==================================================================== */
        /* --- АВТО-ИНВЕРСИЯ ПОД СВЕТЛУЮ ТЕМУ TELEGRAM (ПОЛНЫЙ РЕДИЗАЙН v2.0) --- */
        /* ==================================================================== */
        
        body.tg-light {
            background-color: #f8fafc !important; /* Благородный светло-серо-синий фон */
            color: #0f172a !important;
        }

        /* 1. УБИВАЕМ «БУТЕРБРОД» (Светлая прозрачная шапка и нижний бар) */
        body.tg-light header,
        body.tg-light nav {
            background-color: rgba(255, 255, 255, 0.90) !important;
            border-color: #e2e8f0 !important;
            box-shadow: 0 4px 25px rgba(0, 0, 0, 0.05) !important;
        }
        body.tg-light header h1,
        body.tg-light header .text-white {
            color: #0f172a !important;
        }
        body.tg-light nav button {
            color: #64748b !important;
        }
        body.tg-light nav button.text-indigo-400 {
            color: #4f46e5 !important; /* Сочный индиго для активной иконки */
            transform: scale(1.15) !important;
        }

        /* 2. ЧИСТЫЕ БЕЛОСНЕЖНЫЕ КАРТОЧКИ (Вместо тёмных гробов в магазине и сумке) */
        body.tg-light .bg-slate-950,
        body.tg-light .bg-slate-900,
        body.tg-light .bg-slate-800,
        body.tg-light [class*="bg-slate-900"],
        body.tg-light [class*="bg-slate-950"] {
            background-color: #ffffff !important;
            color: #0f172a !important;
            border-color: #e2e8f0 !important;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04) !important;
        }

        /* 3. КОНТРАСТНАЯ ТИПОГРАФИКА ВНУТРИ КАРТОЧЕК */
        body.tg-light .text-white,
        body.tg-light .text-slate-200,
        body.tg-light .text-slate-300,
        body.tg-light .text-slate-400 {
            color: #334155 !important;
        }
        body.tg-light h2.text-white,
        body.tg-light h3.text-white,
        body.tg-light h4.text-white,
        body.tg-light .font-bold.text-white {
            color: #0f172a !important;
            font-weight: 900 !important;
        }

        /* 4. ПОЛЯ ВВОДА (ИНПУТЫ) И СЕЛЕКТЫ */
        body.tg-light input[type="text"],
        body.tg-light select {
            background-color: #f1f5f9 !important;
            border-color: #cbd5e1 !important;
            color: #0f172a !important;
            font-weight: 700 !important;
        }
        body.tg-light input[type="text"]::placeholder {
            color: #94a3b8 !important;
        }

        /* 5. ПОЛИРОВКА КНОПОК ПОД СВЕТЛЫЙ UX */
        
        /* Главные кнопки (Оставляем сочную заливку и БЕЛЫЙ текст) */
        body.tg-light button.bg-indigo-600,
        body.tg-light button.bg-emerald-600,
        body.tg-light button.bg-amber-600,
        body.tg-light button.bg-blue-600 {
            color: #ffffff !important;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08) !important;
        }

        /* Грязно-коричневые кнопки «Подойдите ближе» -> превращаем в аккуратный disabled */
        body.tg-light button[class*="bg-indigo-900"],
        body.tg-light button[class*="bg-emerald-900"],
        body.tg-light button[class*="bg-amber-900"] {
            background-color: #f1f5f9 !important;
            border-color: #cbd5e1 !important;
            color: #64748b !important;
            font-weight: 700 !important;
            box-shadow: none !important;
        }

        /* Кнопки вариантов ответа в диалогах с NPC */
        body.tg-light button.bg-slate-950 {
            background-color: #f8fafc !important;
            border-color: #e2e8f0 !important;
            color: #0f172a !important;
        }
        body.tg-light button.bg-slate-950:hover {
            background-color: #f1f5f9 !important;
        }

        /* Второстепенные кнопки («Сбросить», «Отказаться») */
        body.tg-light button.bg-slate-800 {
            background-color: #f1f5f9 !important;
            color: #475569 !important;
            border-color: #cbd5e1 !important;
        }

        /* Кнопка «Прервать квест» (В самом низу квеста) */
        body.tg-light button[class*="bg-rose-950"] {
            background-color: #fff1f2 !important;
            border-color: #fecdd3 !important;
            color: #e11d48 !important;
            font-weight: 800 !important;
        }

        /* Кнопка «Отмена» в модалке выбора класса */
        body.tg-light button[class*="bg-rose-600\/20"] {
            background-color: #f1f5f9 !important;
            color: #64748b !important;
        }

        /* 6. ПИЛЛСЫ И ПЛАШКИ (Рюкзак квеста, Баланс в шапке, Подсказки) */
        body.tg-light [class*="bg-indigo-950"],
        body.tg-light [class*="bg-amber-600\/20"],
        body.tg-light [class*="bg-indigo-600\/20"] {
            background-color: #f1f5f9 !important;
            border-color: #cbd5e1 !important;
            box-shadow: none !important;
        }
        
        /* Читаемые тёмные акценты вместо выцветших пастельных */
        body.tg-light .text-amber-400,
        body.tg-light button[class*="text-amber-400"],
        body.tg-light header .text-amber-300 {
            color: #d97706 !important; /* Тёмный янтарь */
        }
        body.tg-light .text-emerald-400,
        body.tg-light header .text-emerald-300 {
            color: #059669 !important; /* Тёмный изумруд */
        }
        body.tg-light .text-blue-400 {
            color: #2563eb !important;
        }
        body.tg-light button[class*="text-indigo-400"] {
            color: #4338ca !important;
        }
        
        /* Раскрытые бесплатные подсказки */
        body.tg-light .bg-indigo-950\/50.text-indigo-200 {
            background-color: #e0e7ff !important;
            color: #312e81 !important;
            border-color: #c7d2fe !important;
        }
        /* ========================================== */
        /* ТИЗЕР КООПЕРАТИВА (ТЕМНАЯ И СВЕТЛАЯ ТЕМЫ)  */
        /* ========================================== */
        .coop-teaser-banner {
            background: linear-gradient(135deg, rgba(30, 27, 75, 0.7), rgba(59, 7, 100, 0.7));
            border: 1px solid rgba(168, 85, 247, 0.35);
        }
        .coop-teaser-banner .coop-title { color: #f3e8ff; }
        .coop-teaser-banner .coop-desc { color: #cbd5e1; }

        body.tg-light .coop-teaser-banner {
            background: linear-gradient(135deg, rgba(238, 242, 255, 0.95), rgba(250, 232, 255, 0.95)) !important;
            border: 1px solid #c7d2fe !important;
            box-shadow: 0 4px 20px rgba(79, 70, 229, 0.08) !important;
        }
        body.tg-light .coop-teaser-banner .coop-title { color: #312e81 !important; }
        body.tg-light .coop-teaser-banner .coop-desc { color: #64748b !important; }
    </style>
</head>
<body class="p-0 m-0">

    <div id="root"></div>

    <script src="https://unpkg.com/@babel/standalone@7.26.9/babel.min.js"></script>
    <script type="text/plain" id="app-source">
        const { useState, useEffect, useRef } = React;
        const tg = window.Telegram?.WebApp;

        function App() {
            const [mapTileUrl, setMapTileUrl] = useState(() => {
                return tg?.colorScheme === 'light' 
                    ? 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png'
                    : 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png';
            });
            useEffect(() => {
                // Глобальный перехватчик 503 ошибки (Технические работы)
                const originalFetch = window.fetch;
                window.fetch = async function(...args) {
                    const response = await originalFetch.apply(this, args);
                    if (response.status === 503) {
                        triggerNotification("⏸ Экспедиция приостановлена: Гейм-мастер проводит технические работы на сервере.", "error");
                    }
                    return response;
                };

                const syncTelegramTheme = () => {
                    const isLight = tg?.colorScheme === 'light';
                    document.body.classList.toggle('tg-light', isLight);
                    
                    const newTile = isLight 
                        ? 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png'
                        : 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png';
                        
                    setMapTileUrl(newTile);
                    
                    // Мгновенная подмена тайлов «на лету» без перезагрузки Leaflet
                    if (mapInstance.current) {
                        mapInstance.current.eachLayer(layer => {
                            if (layer instanceof L.TileLayer) layer.setUrl(newTile);
                        });
                    }
                };

                syncTelegramTheme();
                tg?.onEvent('themeChanged', syncTelegramTheme);
                return () => tg?.offEvent('themeChanged', syncTelegramTheme);
            }, []);
            
            const [activeRandomEvent, setActiveRandomEvent] = useState(null);
            const [achievementsAlerts, setAchievementsAlerts] = useState([]);
            const [activeTab, setActiveTab] = useState("quest");
            const [profile, setProfile] = useState(null);
            const [dailyRiddleAnswer, setDailyRiddleAnswer] = useState("");
            const [tgAvatar, setTgAvatar] = useState(() => tg?.initDataUnsafe?.user?.photo_url || null);

            // --- КАТАЛОГ ПРЕДМЕТОВ ДЛЯ ПЕРЕВОДА SLUG В НАЗВАНИЯ ---
            const [itemsCatalog, setItemsCatalog] = useState({});
            const [inspectedItem, setInspectedItem] = useState(null); // Модалка описания предмета
            
            // --- НОВЫЕ СТЕЙТЫ ДЛЯ ПРОФИЛЕЙ И АЧИВОК ---
            const [inspectedPlayer, setInspectedPlayer] = useState(null); // Модалка чужого профиля
            const [achFilter, setAchFilter] = useState("all"); // Фильтр: "all" | "bronze" | "silver" | "diamond"
            const [inspectedAch, setInspectedAch] = useState(null); // Попап кликабельного достижения
            
            // --- ДОБАВЛЕНО: Стейт окна одышки и турбо-заказа кофе (Спринт 3) ---
            const [exhaustedModal, setExhaustedModal] = useState(null);

            const instantExpressCoffee = async () => {
                const coffeeItem = shop.find(i => i.item_name === "Пермский Эспрессо" || i.name.includes("Экспресс"));
                if (!coffeeItem) { triggerNotification("Эспрессо временно распродан в глобальном каталоге", "error"); return; }
                setLoading(true);
                try {
                    const buyRes = await fetch(`/api/shop/buy/${coffeeItem.id}`, { method: "POST", headers: getHeaders() });
                    if (buyRes.ok) {
                        await fetch(`/api/inventory/use/Пермский Эспрессо`, { method: "POST", headers: getHeaders() });
                        tg?.HapticFeedback?.notificationOccurred('success');
                        triggerNotification("☕️ Экспресс-доставка! Бодрость восстановлена (+45 ⚡️)", "success");
                        setExhaustedModal(null);
                        await loadData(true);
                    } else {
                        const err = await buyRes.json().catch(() => ({}));
                        triggerNotification(err.detail || "Недостаточно монет для экспресс-заказа!", "error");
                    }
                } catch(e) { triggerNotification("Ошибка сети", "error"); }
                setLoading(false);
            };
            // ---------------------------------------------------------------

            // --- ДОБАВЛЕНО: Тумблер симуляции смертного для QA-тестеров ---
            const [mortalMode, setMortalMode] = useState(false);

            const toggleMortalModeQA = async () => {
                try {
                    const res = await fetch("/api/admin/tester/mortal-mode", { method: "POST", headers: getHeaders() });
                    if (res.ok) {
                        const d = await res.json();
                        setMortalMode(d.mortal_mode);
                        tg?.HapticFeedback?.notificationOccurred('warning');
                        triggerNotification(d.message, "info");
                    }
                } catch(e) { triggerNotification("Ошибка переключения QA-мода", "error"); }
            };
            // ------------------------------------------------------------

            const inspectItemBySlug = (slug) => {
                const cleanSlug = (slug || "").replace(/^(📦|🎟|🧙‍♂️)\s*/, "").split(" (")[0].trim();
                const meta = itemsCatalog[cleanSlug] || itemsCatalog[slug];
                if (meta) {
                    setInspectedItem({ ...meta, slug: cleanSlug });
                } else {
                    setInspectedItem({ 
                        name: cleanSlug, 
                        description: "Подробное описание этого артефакта пока скрыто в архивах Пермской губернии.", 
                        weight: 0, 
                        type: "ARTIFACT",
                        slug: cleanSlug 
                    });
                }
            };

            // --- НОВЫЕ ФУНКЦИИ ДЛЯ ПРОФИЛЯ ---
            const openPlayerModal = async (id) => {
                setLoading(true);
                try {
                    const res = await fetch(`/api/player/${id}`, { headers: getHeaders() });
                    if (res.ok) setInspectedPlayer(await res.json());
                    else triggerNotification("Не удалось загрузить профиль юзера", "error");
                } catch(e) { triggerNotification("Ошибка связи", "error"); }
                setLoading(false);
            };

            
            const toggleAnonymity = async () => {
                try {
                    const res = await fetch("/api/profile/anonymity", { method: "POST", headers: getHeaders() });
                    if (res.ok) {
                        const d = await res.json();
                        setProfile(prev => ({ ...prev, is_anonymous: d.is_anonymous }));
                        triggerNotification(d.is_anonymous ? "👻 Профиль скрыт (Анонимный режим)" : "👁 Профиль снова открыт всем", "info");
                    }
                } catch(e) { triggerNotification("Ошибка транзакции", "error"); }
            };

            // --- ЗАПИСЬ ИГРОКА В ЛИСТ ОЖИДАНИЯ КООПЕРАТИВА ---
            const notifyCoopRelease = async () => {
                try {
                    const res = await fetch("/api/profile/notify-coop", { method: "POST", headers: getHeaders() });
                    if (res.ok) {
                        triggerNotification("🎉 Заявка принята! Вы получите пуш-уведомление в бот первыми в день релиза.", "success");
                    }
                } catch(e) { triggerNotification("Ошибка сети", "error"); }
            };
            
            const [mapPoints, setMapPoints] = useState([]);
            const [selectedPoint, setSelectedPoint] = useState(null);
            const [mapReady, setMapReady] = useState(false);
            
            const [activeQuest, setActiveQuest] = useState(null);
            const [activeStandaloneNpc, setActiveStandaloneNpc] = useState(null);
            
            // --- СОСТОЯНИЯ ИНВЕНТАРЯ И КРАФТА ---
            const [inventory, setInventory] = useState({ items: [], current_weight: 0 });
            const [invTab, setInvTab] = useState("items"); // "items" | "craft"
            const [recipes, setRecipes] = useState([]);
            
            const [shop, setShop] = useState([]);
            const [leaderboard, setLeaderboard] = useState([]);
            const [leaderboardPeriod, setLeaderboardPeriod] = useState("global");
            const [loading, setLoading] = useState(true);
            
            const [cities, setCities] = useState([]);
            const [selectedMarketId, setSelectedMarketId] = useState(null);
            const [compassHeading, setCompassHeading] = useState(0);
            const [bearing, setBearing] = useState(0);
            
            const [notifications, setNotifications] = useState([]);
            // --- СИСТЕМА УДЕРЖИВАЕМОГО ТОСТА (13 секунд по ТЗ) ---
            const activeOperationRef = useRef(null);
            const [persistentToast, setPersistentToast] = useState(null);

            // Лёгкая синхронизация кошелька без перегрузки мобильной сети
            const syncProfile = async () => {
                try {
                    const res = await fetch("/api/profile", { headers: getHeaders() });
                    if (res.ok) setProfile(await res.json());
                } catch(e) {}
            };

            const startPersistentToast = (text) => {
                if (loading || persistentToast) return null; // ЗАЩИТА ОТ ДВОЙНОГО КЛИКА
                const opId = Date.now();
                activeOperationRef.current = opId;
                setPersistentToast({ id: opId, text });
                setLoading(true);

                // Авто-снятие ровно через 13 секунд по ТЗ
                setTimeout(() => {
                    if (activeOperationRef.current === opId) {
                        setPersistentToast(null);
                        setLoading(false);
                        activeOperationRef.current = null;
                    }
                }, 13000);

                return opId;
            };

            const stopPersistentToast = () => { // Снимаем бронестекло всегда, без привязки к opId
                setPersistentToast(null);
                setLoading(false);
                activeOperationRef.current = null;
            };
            const [unlockedHints, setUnlockedHints] = useState({});
            const [timeElapsed, setTimeElapsed] = useState(0);
            const [showClassModal, setShowClassModal] = useState(false);

            const COIN_SYMBOL = "💎";
            const COIN_LABEL = "монет";

            const [sliderValue, setSliderValue] = useState(50);
            const sliderRef = useRef(null);
            const isDragging = useRef(false);

            const [mockGps, setMockGps] = useState(false);
            const [coords, setCoords] = useState({ latitude: 58.0097, longitude: 56.2444 });
            const [currentDistance, setCurrentDistance] = useState(null);
            const lastPingTime = useRef(0);

            const mapContainerRef = useRef(null);
            const mapInstance = useRef(null);
            const userMarkerRef = useRef(null);
            const userCircleRef = useRef(null);
            const markersLayerRef = useRef(null);

            const getHeaders = () => {
                const initData = tg?.initData || "user=%7B%22id%22%3A5748413499%2C%22first_name%22%3A%22%D0%94%D0%BC%D0%B8%D1%82%D1%80%D0%B8%D0%B9%22%2C%22username%22%3A%22dm_perm%22%7D&hash=mockhash";
                return {
                    "Content-Type": "application/json",
                    "X-Tg-Init-Data": initData
                };
            };

            const triggerNotification = (text, type = "success") => {
                const id = Date.now() + Math.random();
                setNotifications(prev => [...prev, { id, text, type }]);
                setTimeout(() => {
                    setNotifications(prev => prev.filter(n => n.id !== id));
                }, 7000);
            };

            const pingLocation = async (lat, lng) => {
                try {
                    const res = await fetch("/api/quest/ping-location", {
                        method: "POST", headers: getHeaders(), body: JSON.stringify({ latitude: lat, longitude: lng })
                    });
                    const d = await res.json();
                    if (d.status === "speed_warning" || d.status === "banned") {
                        triggerNotification(d.message, "error");
                        if (d.status === "banned") loadData();
                    }
                } catch (e) {
                    console.warn("Ping location failed");
                }
            };
            useEffect(() => {
                if (tg) {
                    tg.ready();
                    tg.expand();
                }
                loadData();
            }, [activeTab, leaderboardPeriod, selectedMarketId]);

            // Фоновый тихий радар присутствия (Heartbeat на витрине магазина)
            useEffect(() => {
                let presenceInterval;
                if (activeTab === "shop" && selectedMarketId) {
                    const sendHeartbeat = () => {
                        fetch("/api/presence/heartbeat", {
                            method: "POST",
                            headers: getHeaders(),
                            body: JSON.stringify({ market_id: selectedMarketId })
                        }).catch(() => {});
                    };
                    sendHeartbeat(); // Первый импульс сразу при входе
                    presenceInterval = setInterval(sendHeartbeat, 60000); // Повтор каждые 60 секунд
                }
                return () => clearInterval(presenceInterval);
            }, [activeTab, selectedMarketId]);

            useEffect(() => {
                let iv;
                if (activeQuest && activeQuest.time_passed_seconds !== undefined && activeQuest.gps_verified) {
                    setTimeElapsed(activeQuest.time_passed_seconds);
                    iv = setInterval(() => { setTimeElapsed(prev => prev + 1); }, 1000);
                }
                return () => clearInterval(iv);
            }, [activeQuest]);

            useEffect(() => {
                lucide.createIcons();
            });

            useEffect(() => {
                if (activeTab === "quest" && !activeQuest && mapContainerRef.current && !mapInstance.current) {

                    let lastTap = 0;
                    let isDragZooming = false;
                    let startY = 0;
                    let maxDeltaY = 0;
                    let startZoom = 15;

                    const mapDom = mapContainerRef.current;
                    mapDom.addEventListener('touchstart', (e) => {
                        if (e.touches.length === 1) {
                            const now = Date.now();
                            if (now - lastTap < 300) {
                                isDragZooming = true;
                                startY = e.touches[0].clientY;
                                maxDeltaY = 0;
                                startZoom = mapInstance.current.getZoom();
                                mapInstance.current.dragging.disable();
                                e.preventDefault();
                            }
                            lastTap = now;
                        }
                    }, { passive: false });

                    // Инвертированный зум: тянем вниз = Zoom IN (+), толкаем вверх = Zoom OUT (-)
                    mapDom.addEventListener('touchmove', (e) => {
                        if (isDragZooming && e.touches.length === 1) {
                            const deltaY = e.touches[0].clientY - startY;
                            if (Math.abs(deltaY) > Math.abs(maxDeltaY)) maxDeltaY = deltaY;
                            const zoomDiff = deltaY / 80; 
                            const targetZoom = Math.min(19, Math.max(3, startZoom + zoomDiff));
                            mapInstance.current.setZoom(targetZoom, { animate: false });
                            e.preventDefault();
                        }
                    }, { passive: false });

                        if (isDragZooming) {
                            // Если при дабл-тапе палец почти не сдвинулся (< 10px) — это классический двойной клик!
                            if (Math.abs(maxDeltaY) < 10) {
                                mapInstance.current.setZoom(Math.min(19, startZoom + 1));

            const calculateHaversine = (lat1, lon1, lat2, lon2) => {
                const R = 6371000;
                const dLat = (lat2 - lat1) * Math.PI / 180;
                const dLon = (lon2 - lon1) * Math.PI / 180;
                const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                          Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                          Math.sin(dLon/2) * Math.sin(dLon/2);
                const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                return R * c;
            };

                                    <div class="bg-white border border-slate-200 p-3 rounded-2xl shadow-sm"><span class="text-[9px] font-black text-slate-400 block uppercase tracking-wider">Уровень</span><span class="text-sm font-black text-slate-900">{profile.level} Lvl</span></div>
                                    <div class="bg-white border border-slate-200 p-3 rounded-2xl shadow-sm"><span class="text-[9px] font-black text-slate-400 block uppercase tracking-wider">Экспедиций</span><span class="text-sm font-black text-emerald-600">{profile.completed_quests_count || 0} шт.</span></div>
                                    <div class="bg-white border border-slate-200 p-3 rounded-2xl shadow-sm"><span class="text-[9px] font-black text-slate-400 block uppercase tracking-wider">Рейтинг</span><span class="text-sm font-black text-indigo-600">{profile.score || 0} pts</span></div>
                                </div>

                                <div class="grid grid-cols-2 gap-3">
                                    <button onClick={() => setShowClassModal(true)} class="bg-indigo-600 hover:bg-indigo-500 text-white font-bold text-xs py-3 rounded-xl shadow-lg transition-colors">
                                        {profile.rpg_class === "Не выбран" ? "🎭 Выбрать Класс" : "🎭 Сменить класс"}
                                    </button>
                                <button onClick={claimIncome} class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold text-xs py-3 rounded-xl shadow-lg transition-colors">
                                    Собрать {profile.income_buffer || 0} {COIN_LABEL}
                                </button>
                            </div>

                            {/* БЛОК ЕЖЕДНЕВНОЙ ЗАГАДКИ */}
                            {profile.daily_riddle && (
                                <div class="bg-slate-900 border border-slate-800 p-5 rounded-3xl space-y-3 shadow-lg relative overflow-hidden transition-all">
                                    <div class="flex items-center justify-between">
                                        <div class="flex items-center gap-2">
                                            <span class="text-xl">📜</span>
                                            <h4 class="text-sm font-black uppercase tracking-wider text-amber-400">Загадка дня</h4>
                                        </div>
                                        <span class="text-xs font-extrabold bg-amber-500/20 text-amber-300 border border-amber-500/30 px-2.5 py-1 rounded-full">
                                            +{profile.daily_riddle.reward_coins} {COIN_SYMBOL}
                                        </span>
                                    </div>

                                    <p class="text-xs font-semibold leading-relaxed text-slate-200">
                                        {profile.daily_riddle.question}
                                    </p>

                                    {profile.riddle_solved_today ? (
                                        <div class="bg-emerald-500/10 border border-emerald-500/20 rounded-2xl p-3 text-center">
                                            <span class="text-xs font-black text-emerald-400 block">✨ Разгадано! Награда получена.</span>
                                            <span class="text-[10px] text-slate-400 font-medium mt-0.5 block">Новый свиток откроется завтра</span>
                                        </div>
                                    ) : (
                                        <div class="flex gap-2 pt-1">
                                            <input 
                                                type="text" 
                                                value={dailyRiddleAnswer} 
                                                onChange={(e) => setDailyRiddleAnswer(e.target.value)} 
                                                onKeyDown={(e) => { if (e.key === 'Enter') solveDailyRiddle(); }}
                                                placeholder="Ваш ответ..." 
                                                class="flex-1 bg-slate-950 border border-slate-800 px-3.5 py-2.5 rounded-xl text-xs font-bold text-white placeholder-slate-500 focus:border-amber-500 outline-none transition-colors"
                                            />
                                            <button 
                                                onClick={solveDailyRiddle}
                                                class="bg-amber-500 hover:bg-amber-400 text-slate-950 font-black text-xs px-4 py-2.5 rounded-xl shadow-md transition-all shrink-0 active:scale-95"
                                            >
                                                Ответить
                                            </button>
                                        </div>
                                    )}
                                </div>
                            )}

                            <div class="bg-white border border-slate-200 p-5 rounded-3xl space-y-4 shadow-sm">
                                <div class="flex items-center justify-between">
                                        <h4 class="text-sm font-black text-slate-900">🏆 Достижения</h4>
                                        <div class="flex gap-1 bg-slate-100 p-1 rounded-xl border border-slate-200">
                                            {["all", "bronze", "silver", "diamond"].map(t => (
                                                <button key={t} onClick={() => setAchFilter(t)} class={`px-2.5 py-1 text-[9px] font-black rounded-lg uppercase transition-all ${achFilter === t ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-400 hover:text-slate-600'}`}>
                                                    {t === 'all' ? 'Все' : t === 'bronze' ? '🥉' : t === 'silver' ? '🥈' : '💎'}
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    <div class="grid grid-cols-2 gap-2.5 max-h-64 overflow-y-auto pr-1">
                                        {(profile.achievements || []).filter(a => achFilter === 'all' || a.tier === achFilter).length === 0 ? (
                                            <div class="col-span-2 py-6 text-center text-xs text-slate-400 font-medium">Нет регалий в этой категории.</div>
                                        ) : (
                                            (profile.achievements || []).filter(a => achFilter === 'all' || a.tier === achFilter).map((a, idx) => (
                                                <div key={idx} onClick={() => setInspectedAch(a)} class={`border p-3 rounded-2xl flex items-center gap-3 cursor-pointer hover:scale-[1.02] transition-all shadow-sm group ${a.tier === 'diamond' ? 'bg-cyan-50/40 border-cyan-300 hover:border-cyan-500' : a.tier === 'silver' ? 'bg-slate-50 border-slate-300 hover:border-slate-500' : 'bg-amber-50/40 border-amber-300 hover:border-amber-500'}`}>
                                                    <span class="text-2xl shrink-0 group-hover:scale-110 transition-transform">{a.badge || "🏆"}</span>
                                                    <div class="overflow-hidden">
                                                        <div class="text-xs font-black text-slate-900 truncate">{a.name}</div>
                                                        <span class={`text-[9px] font-black uppercase tracking-widest block truncate ${a.tier === 'diamond' ? 'text-cyan-600' : a.tier === 'silver' ? 'text-slate-500' : 'text-amber-700'}`}>
                                                            {a.tier === 'diamond' ? '💎 Алмаз' : a.tier === 'silver' ? '🥈 Серебро' : '🥉 Бронза'}
                                                        </span>
                                                    </div>
                                                                </div>
                                                            ))
                                                        )}
                                                    </div>
                                                </div>

                                                {/* БЛОК СЮЖЕТНОГО КООПА (В РАЗРАБОТКЕ) */}
                                                <div class="coop-teaser-banner p-5 rounded-3xl flex items-center justify-between shadow-lg transition-all">
                                                    <div class="flex items-center gap-3.5 overflow-hidden">
                                                        <div class="w-12 h-12 rounded-2xl bg-indigo-500/20 border border-indigo-500/30 flex items-center justify-center text-2xl shrink-0 shadow-inner">
                                                            👥
                                                        </div>
                                                        <div class="overflow-hidden">
                                                            <div class="flex items-center gap-2 font-black text-xs uppercase tracking-wider truncate">
                                                                <span class="coop-title truncate">Сюжетный КооП</span>
                                                                <span class="bg-indigo-500 text-white text-[9px] px-1.5 py-0.5 rounded font-black shrink-0">СКОРО</span>
                                                            </div>
                                                            <p class="text-xs coop-desc font-medium mt-0.5 truncate">Экспедиции с друзьями до 4 чел.</p>
                                                        </div>
                                                    </div>
                                                    <button 
                                                        onClick={notifyCoopRelease} 
                                                        class="bg-indigo-600 hover:bg-indigo-500 active:scale-95 text-white font-black text-xs px-3.5 py-2.5 rounded-xl shadow-md transition-all shrink-0 ml-2"
                                                    >
                                                        🔔 Жду релиз!
                                                    </button>
                                                </div>

                                            </div>
                                        )}

                        {activeTab === "inventory" && (

                            <div class="space-y-4 px-4 mt-4">
                                <div class="flex gap-1 bg-slate-100 p-1 rounded-xl border border-slate-200">
                                    <button onClick={() => setInvTab('items')} class={`flex-1 py-2 text-[11px] font-bold rounded-lg uppercase tracking-wider transition-all duration-200 ${invTab === 'items' ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-400 hover:text-slate-600'}`}>🎒 Содержимое</button>
                                    <button onClick={() => setInvTab('craft')} class={`flex-1 py-2 text-[11px] font-bold rounded-lg uppercase tracking-wider transition-all duration-200 ${invTab === 'craft' ? 'bg-amber-500 text-white shadow-lg' : 'text-slate-400 hover:text-slate-600'}`}>⚒️ Верстак</button>
                                </div>

                                {invTab === "items" ? (
                                    <>
                                        <div class="bg-white border border-slate-200 p-5 rounded-2xl shadow-sm">
                                            <div class="flex justify-between text-xs font-bold uppercase text-slate-400 mb-2">
                                                <span>Грузоподъемность рюкзака</span>
                                                <span>{inventory.current_weight} / {profile?.max_weight_capacity || 10} кг</span>
                                            </div>
                                            <div class="w-full bg-slate-100 h-3 rounded-full overflow-hidden border border-slate-200 mb-1">
                                                <div class={`h-full rounded-full ${inventory.current_weight > (profile?.max_weight_capacity || 10) ? "bg-rose-500" : "bg-indigo-500"}`} style={{ width: `${Math.min(100, (inventory.current_weight / (profile?.max_weight_capacity || 10)) * 100)}%` }}></div>
                                            </div>
                                        </div>

                                        <div class="space-y-2">
                                            {inventory.items.length === 0 ? (
                                                <div class="bg-white border border-slate-200 p-8 rounded-2xl text-center shadow-sm">
                                                    <span class="text-4xl block mb-2">🎒</span>
                                                    <h4 class="font-black text-slate-900 text-base">Рюкзак пуст</h4>
                                                    <p class="text-xs text-slate-500 mt-1">Исследуйте Пермь, чтобы находить тайные реликвии.</p>
                                                </div>
                                            ) : (
                                                inventory.items.map((slug, idx) => {
                                                    const cleanKey = (slug || "").replace(/^(📦|🎟|🧙‍♂️)\s*/, "").split(" (")[0].trim();
                                                    const meta = itemsCatalog[cleanKey] || { name: slug, description: "Нажмите, чтобы изучить свойства" };
                                                    return (
                                                        <div key={idx} onClick={() => inspectItemBySlug(slug)} class="bg-white border border-slate-200 p-4 rounded-xl flex items-center justify-between gap-3 shadow-sm hover:border-indigo-400 hover:shadow-md cursor-pointer transition-all group">
                                                            <div class="flex items-center gap-3 overflow-hidden">
                                                                <span class="text-2xl shrink-0 group-hover:scale-110 transition-transform">📦</span>
                                                                <div class="overflow-hidden">
                                                                    <h4 class="font-black text-slate-900 text-sm truncate">{meta.name}</h4>
                                                                    <span class="text-[11px] text-slate-400 font-medium block truncate">{meta.description}</span>
                                                                </div>
                                                            </div>
                                                            <div class="flex gap-1.5 shrink-0" onClick={(e) => e.stopPropagation()}>
                                                                {slug.toLowerCase().includes("эликсир") && (
                                                                    <button onClick={() => useConsumable(slug)} class="bg-indigo-600 hover:bg-indigo-500 text-white text-[11px] font-black px-3 py-2 rounded-xl shadow-md active:scale-95 transition-all">Выпить</button>
                                                                )}
                                                                <button onClick={() => discardItem(slug)} class="bg-slate-100 hover:bg-rose-50 text-slate-600 hover:text-rose-600 text-[11px] font-black px-3 py-2 rounded-xl border border-slate-200 hover:border-rose-200 active:scale-95 transition-all">Сбросить</button>
                                                            </div>
                                                        </div>
                                                    );
                                                })
                                            )}
                                        </div>
                                    </>
                                ) : (
                                    <div class="space-y-3">
                                        <div class="bg-amber-50 border border-amber-100 p-4 rounded-xl text-center shadow-sm">
                                            <span class="text-3xl">⚒️</span>
                                            <h4 class="font-bold text-amber-600 mt-2 text-sm uppercase tracking-widest">Создание артефактов</h4>
                                        </div>
                                        {recipes.length === 0 ? (
                                            <div class="bg-white border border-slate-200 p-8 rounded-2xl text-center shadow-sm">
                                                <h4 class="font-black text-slate-900 text-base">Нет изученных схем</h4>
                                            </div>
                                        ) : (
                                            recipes.map(r => {
                                                const resMeta = itemsCatalog[r.result_item_name] || { name: r.result_item_name };
                                                return (
                                                    <div key={r.id} class="bg-white border border-slate-200 p-5 rounded-2xl shadow-sm hover:shadow-md transition-shadow">
                                                        <div class="flex items-center justify-between mb-1">
                                                            <h4 class="text-slate-900 font-black text-base">{r.name}</h4>
                                                            <button onClick={() => inspectItemBySlug(r.result_item_name)} class="text-xs text-indigo-600 hover:text-indigo-800 font-black flex items-center gap-1 bg-indigo-50 hover:bg-indigo-100 px-3 py-1 rounded-xl transition-colors active:scale-95">ℹ️ Что получится?</button>
                                                        </div>
                                                        <p class="text-xs text-slate-500 mb-4 leading-relaxed">{r.description}</p>
                                                        <div class="bg-slate-50 p-3.5 rounded-xl border border-slate-200 mb-4 space-y-2">
                                                            <span class="text-[9px] uppercase text-slate-400 font-black block tracking-widest">Требуемые компоненты:</span>
                                                            {Object.entries(r.ingredients || {}).map(([ingSlug, amt]) => {
                                                                const count = inventory.items.filter(i => i === ingSlug).length;
                                                                const hasEnough = count >= amt;
                                                                const ingMeta = itemsCatalog[ingSlug] || { name: ingSlug };
                                                                return (
                                                                    <div key={ingSlug} onClick={() => inspectItemBySlug(ingSlug)} class="flex justify-between items-center text-xs font-bold p-1.5 rounded-lg hover:bg-white hover:shadow-sm cursor-pointer transition-all">
                                                                        <span class={`flex items-center gap-2 truncate ${hasEnough ? "text-slate-800" : "text-rose-600"}`}><span>📦</span><span class="underline decoration-dotted underline-offset-2 truncate">{ingMeta.name}</span></span>
                                                                        <span class={`shrink-0 font-mono text-xs ${hasEnough ? "text-emerald-600 font-black" : "text-rose-600 font-black"}`}>{count} / {amt}</span>
                                                                    </div>
                                                                );
                                                            })}
                                                        </div>
                                                        <button onClick={() => craftItem(r.id)} class="w-full bg-amber-500 hover:bg-amber-400 text-white py-3.5 rounded-xl font-black text-sm shadow-md active:scale-95 transition-all">⚒️ Собрать «{resMeta.name}»</button>
                                                    </div>
                                                );
                                            })
                                        )}
                                    </div>
                                )}
                            </div>
                        )}

                        {activeTab === "shop" && (

                            <div class="space-y-4 px-4 mt-4">
                                <div class="bg-white border border-slate-200 p-5 rounded-2xl shadow-sm">
                                    <h3 class="text-lg font-black text-slate-900 mb-2">{selectedMarketId ? "🏪 Локальный рынок" : "🏪 Глобальный магазин"}</h3>
                                    <p class="text-xs text-slate-500">Обменивайте монеты на сюжетные реликвии, премиум-билеты или расходные материалы.</p>
                                    {selectedMarketId && (
                                        <button onClick={() => { setSelectedMarketId(null); loadData(); }} class="mt-3 text-xs text-indigo-600 font-bold underline hover:text-indigo-800">Вернуться в глобальный магазин</button>
                                    )}
                                </div>
                                <div class="grid gap-3">
                                    {shop.map((item) => (
                                        <div key={item.id} class="bg-white border border-slate-200 p-4 rounded-xl flex flex-col justify-between gap-3 shadow-sm">
                                            <div>
                                                <div class="flex justify-between items-start mb-1">
                                                    <h4 class="font-black text-md text-slate-900">{item.name}</h4>
                                                    <span class="text-sm font-extrabold text-amber-500">{item.price} {COIN_LABEL}</span>
                                                </div>
                                                <p class="text-xs text-slate-500 leading-normal">{item.description}</p>
                                            </div>
                                            <button onClick={() => buyItem(item.id)} class="w-full bg-indigo-600 hover:bg-indigo-500 text-white py-3 rounded-xl text-xs font-black transition-colors shadow-md">Купить за {item.price} {COIN_LABEL}</button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === "rating" && (

                            <div class="space-y-4 px-4 mt-4">
                                <div class="flex gap-1 bg-slate-100 p-1 rounded-xl border border-slate-200">
                                    {["global", "month", "year"].map((p) => (
                                        <button key={p} onClick={() => setLeaderboardPeriod(p)} class={`flex-1 py-2 text-[10px] font-bold rounded-lg uppercase tracking-wider transition-all duration-200 ${leaderboardPeriod === p ? "bg-indigo-600 text-white shadow-md" : "text-slate-400 hover:text-slate-600"}`}>
                                            {p === "global" ? "Глобальный" : p === "month" ? "Месяц" : "Год"}
                                        </button>
                                    ))}
                                </div>
                                <div class="bg-white border border-slate-200 rounded-3xl overflow-hidden divide-y divide-slate-100 shadow-sm">
                                    {leaderboard.length === 0 ? (
                                        <div class="p-8 text-center text-xs text-slate-500">В этой категории пока нет рекордов.</div>
                                    ) : (
                                        leaderboard.map((user, idx) => (
                                            <div key={idx} class="p-4 flex items-center justify-between gap-3 hover:bg-slate-50 transition-colors">
                                                <div class="flex items-center gap-3.5 overflow-hidden">
                                                    <span class={`w-8 h-8 flex items-center justify-center rounded-2xl text-xs font-black shadow-inner shrink-0 ${idx === 0 ? "bg-amber-400 text-slate-900" : idx === 1 ? "bg-slate-200 text-slate-900" : idx === 2 ? "bg-amber-600 text-white" : "bg-slate-100 text-slate-500 border"}`}>
                                                        {idx + 1}
                                                    </span>
                                                    <div class="overflow-hidden">
                                                        <h4 class="font-black text-slate-900 text-sm flex items-center gap-2 truncate">
                                                            <span class="truncate">{user.full_name}</span>
                                                            <button onClick={() => openPlayerModal(user.telegram_id)} class="text-indigo-600 hover:text-indigo-800 hover:bg-indigo-50 p-1 rounded-lg transition-colors shrink-0">ℹ️</button>
                                                        </h4>
                                                        <span class="text-[10px] text-slate-400 font-bold uppercase tracking-wider block truncate">{user.title} | Lvl {user.level}</span>
                                                    </div>
                                                </div>
                                                <span class="text-sm font-black text-indigo-600 shrink-0">{user.total_score} pts</span>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        )}

                    </main>

                    <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-slate-900/95 backdrop-blur-md border-t border-slate-800 py-3 px-6 flex justify-between z-[600]">
                        {[
                            { id: "quest", icon: "map", label: "Карта" },
                            { id: "profile", icon: "user", label: "Профиль" },
                            { id: "inventory", icon: "briefcase", label: "Рюкзак" },
                            { id: "shop", icon: "shopping-cart", label: "Магазин" },
                            { id: "rating", icon: "trophy", label: "Рейтинг" }
                        ].map((tab) => (
                            <button 
                                key={tab.id}
                                onClick={() => setActiveTab(tab.id)}
                                class={`flex flex-col items-center gap-1.5 bg-transparent border-none outline-none cursor-pointer transition-all duration-300 ${
                                    activeTab === tab.id ? "text-indigo-400 scale-110 drop-shadow-[0_0_8px_rgba(99,102,241,0.5)]" : "text-slate-500 hover:text-slate-300"
                                }`}
                            >
                                <i data-lucide={tab.icon} class="w-5 h-5"></i>
                                <span class="text-[9px] font-extrabold uppercase tracking-widest">{tab.label}</span>
                            </button>
                        ))}
                    </nav>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
    <script>
        (function () {
            const source = document.getElementById("app-source").textContent;
            const { code } = Babel.transform(source, { presets: ["react"] });
            const script = document.createElement("script");
            script.text = code;
            document.body.appendChild(script);
        })();
    </script>
</body>
</html>
